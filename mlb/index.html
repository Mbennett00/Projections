<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MLB Board — Slate</title>
<meta name="theme-color" content="#0B1020">
<link rel="manifest" href="../manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B1020; --card:#141C30; --card-2:#1B2540; --line:#25304E;
  --blue:#4C8DFF; --yellow:#FFD34D; --red:#FF6B6B; --text:#EEF2FA; --muted:#94A1BE; --r:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg); color:var(--text); font-family:'Inter',system-ui,sans-serif;
  min-height:100dvh; max-width:520px; margin:0 auto;
  padding:max(16px,env(safe-area-inset-top)) 16px max(28px,env(safe-area-inset-bottom));
}
header{display:flex; align-items:center; gap:12px; padding:4px 2px 18px}
.back{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--line);
  display:grid;place-items:center;color:var(--text);text-decoration:none;font-weight:700;flex:none}
h1{font-family:'Sora',sans-serif;font-weight:700;font-size:19px;flex:1}
.updated{font-size:11.5px;font-weight:600;color:var(--yellow);background:rgba(255,211,77,.1);
  border:1px solid rgba(255,211,77,.22);padding:6px 10px;border-radius:99px;white-space:nowrap}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{flex:1;text-align:center;font-size:13.5px;font-weight:600;color:var(--muted);
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:11px 0;cursor:pointer;user-select:none;transition:all .15s}
.tab.on{color:#0B1020;background:var(--yellow);border-color:var(--yellow)}
.slate-label{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.1em;
  text-transform:uppercase;margin:2px 2px 12px}
/* game cards */
.game{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;margin-bottom:12px}
.g-top{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:11px}
.state{font-size:10.5px;font-weight:700;letter-spacing:.06em;padding:4px 9px;border-radius:99px}
.state.live{color:#0B1020;background:var(--red);animation:pulse 2s infinite}
.state.final{color:var(--muted);background:var(--card-2)}
.state.preview{color:var(--blue);background:rgba(76,141,255,.12)}
@keyframes pulse{50%{opacity:.65}}
.tier{font-size:10.5px;font-weight:700;letter-spacing:.06em;padding:4px 9px;border-radius:99px;margin-left:6px}
.tier.STRONG{color:#0B1020;background:var(--yellow)}
.tier.LEAN{color:var(--blue);background:rgba(76,141,255,.12);border:1px solid rgba(76,141,255,.3)}
.tier.PASS{color:var(--muted);background:var(--card-2)}
.team{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.t-name{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px;min-width:0}
.t-abbr{font-family:'Sora',sans-serif;font-weight:700;font-size:12px;color:var(--blue);
  background:rgba(76,141,255,.12);border-radius:8px;padding:4px 7px;min-width:44px;text-align:center;flex:none}
.t-city{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-num{font-variant-numeric:tabular-nums;font-weight:600;font-size:14px;color:var(--muted);flex:none;margin-left:8px}
.t-num.fav{color:var(--text)}
.t-score{font-family:'Sora',sans-serif;font-weight:700;font-size:17px;color:var(--text);flex:none;margin-left:8px}
.prob-track{height:6px;border-radius:99px;background:var(--card-2);margin:11px 0 9px;overflow:hidden;display:flex}
.prob-away{height:100%;background:var(--blue);border-radius:99px 0 0 99px;transition:width .6s ease}
.g-stats{display:flex;gap:6px;margin-top:10px}
.stat{flex:1;background:var(--card-2);border-radius:10px;padding:8px 6px;text-align:center}
.stat .v{font-family:'Sora',sans-serif;font-weight:700;font-size:13.5px;color:var(--text);font-variant-numeric:tabular-nums}
.stat .v.hot{color:var(--yellow)}
.stat .l{font-size:10px;color:var(--muted);font-weight:600;margin-top:2px;letter-spacing:.03em}
.pitchers{font-size:12px;color:var(--muted);margin-top:10px;padding-top:9px;border-top:1px solid var(--line);line-height:1.5}
.pitchers b{color:var(--text);font-weight:600}
/* plays */
.chips{display:flex;gap:7px;overflow-x:auto;padding:2px 2px 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;font-size:12.5px;font-weight:600;color:var(--muted);background:var(--card);
  border:1px solid var(--line);border-radius:99px;padding:8px 14px;cursor:pointer;user-select:none;white-space:nowrap}
.chip.on{color:#0B1020;background:var(--blue);border-color:var(--blue)}
.hr-strip{background:linear-gradient(160deg,var(--card-2),var(--card));border:1px solid var(--line);
  border-radius:var(--r);padding:13px 16px;margin-bottom:12px}
.hr-title{font-family:'Sora',sans-serif;font-weight:700;font-size:12px;letter-spacing:.12em;color:var(--yellow);margin-bottom:9px}
.hr-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13.5px}
.hr-row .nm{font-weight:600}
.hr-row .tm{color:var(--muted);font-size:11.5px;font-weight:500;margin-left:7px}
.hr-row .pct{font-family:'Sora',sans-serif;font-weight:700;color:var(--yellow);font-variant-numeric:tabular-nums}
.play{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:13px 16px;margin-bottom:9px;display:flex;align-items:center;gap:12px}
.p-main{flex:1;min-width:0}
.p-player{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-meta{font-size:12px;color:var(--muted);margin-top:3px}
.p-meta b{color:var(--blue);font-weight:600}
.side{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;margin-right:5px;letter-spacing:.04em}
.side.OVER{color:#0B1020;background:var(--yellow)}
.side.UNDER{color:var(--blue);background:rgba(76,141,255,.14);border:1px solid rgba(76,141,255,.3)}
.p-edge{text-align:right;flex:none}
.edge-val{font-family:'Sora',sans-serif;font-weight:700;font-size:16px;color:var(--yellow);font-variant-numeric:tabular-nums}
.edge-bar{width:60px;height:5px;border-radius:99px;background:var(--card-2);margin-top:5px;overflow:hidden;margin-left:auto}
.edge-fill{height:100%;background:var(--yellow);border-radius:99px}
.p-odds{font-size:11px;color:var(--muted);margin-top:4px;font-variant-numeric:tabular-nums}
.more{width:100%;text-align:center;font-size:13.5px;font-weight:600;color:var(--blue);
  background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;cursor:pointer;font-family:inherit}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:60px 20px}
.hide{display:none}
@media (prefers-reduced-motion:reduce){.prob-away{transition:none}.state.live{animation:none}}
</style>
</head>
<body>
<header>
  <a class="back" href="../">←</a>
  <h1>MLB Board</h1>
  <span class="updated" id="updated">…</span>
</header>

<div class="tabs">
  <div class="tab on" data-tab="games">Games</div>
  <div class="tab" data-tab="plays">Top Plays</div>
</div>

<div class="slate-label" id="slate"></div>
<div id="games"></div>
<div id="plays" class="hide"></div>

<script>
const $ = id => document.getElementById(id);
const ABBR = {"Arizona Diamondbacks":"ARI","Athletics":"ATH","Oakland Athletics":"ATH","Atlanta Braves":"ATL","Baltimore Orioles":"BAL","Boston Red Sox":"BOS","Chicago Cubs":"CHC","Chicago White Sox":"CWS","Cincinnati Reds":"CIN","Cleveland Guardians":"CLE","Colorado Rockies":"COL","Detroit Tigers":"DET","Houston Astros":"HOU","Kansas City Royals":"KC","Los Angeles Angels":"LAA","Los Angeles Dodgers":"LAD","Miami Marlins":"MIA","Milwaukee Brewers":"MIL","Minnesota Twins":"MIN","New York Mets":"NYM","New York Yankees":"NYY","Philadelphia Phillies":"PHI","Pittsburgh Pirates":"PIT","San Diego Padres":"SD","San Francisco Giants":"SF","Seattle Mariners":"SEA","St. Louis Cardinals":"STL","Tampa Bay Rays":"TB","Texas Rangers":"TEX","Toronto Blue Jays":"TOR","Washington Nationals":"WSH"};
const ab = n => ABBR[n] || (n||'').split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase();
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const rel = iso => {
  const m = Math.round((Date.now() - new Date(iso)) / 60000);
  if (isNaN(m)) return '';
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.round(m/60);
  return h < 24 ? h + 'h ago' : Math.round(h/24) + 'd ago';
};
const gameTime = iso => new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
const odds = v => v > 0 ? '+' + v : String(v);
const pct = v => (v*100).toFixed(0) + '%';

let DATA = null, marketFilter = 'All', shown = 60;

function stateBadge(g){
  if (g.game_state === 'Live') {
    const half = g.inning_half === 'Top' ? '▲' : '▼';
    return `<span class="state live">LIVE ${half}${g.inning ?? ''}</span>`;
  }
  if (g.game_state === 'Final') return `<span class="state final">FINAL</span>`;
  return `<span class="state preview">${esc(gameTime(g.game_time))}</span>`;
}

function gameCard(g){
  const hasModel = typeof g.away_win_pct === 'number';
  const done = g.game_state === 'Final' || g.game_state === 'Live';
  const aFav = hasModel && g.away_win_pct >= g.home_win_pct;
  const rows = ['away','home'].map(s => {
    const num = done
      ? `<span class="t-score">${g[s+'_score'] ?? '–'}</span>`
      : hasModel
        ? `<span class="t-num ${((s==='away')===aFav)?'fav':''}">${g[s+'_runs']?.toFixed(1) ?? '–'} · ${pct(g[s+'_win_pct'])}</span>`
        : `<span class="t-num">–</span>`;
    return `<div class="team">
      <span class="t-name"><span class="t-abbr">${ab(g[s+'_team'])}</span><span class="t-city">${esc(g[s+'_team'])}</span></span>
      ${num}</div>`;
  }).join('');
  const stats = hasModel ? `<div class="g-stats">
      <div class="stat"><div class="v ${g.p_over_8_5>=.6?'hot':''}">${pct(g.p_over_8_5)}</div><div class="l">O8.5</div></div>
      <div class="stat"><div class="v">${pct(g.p_any_hr)}</div><div class="l">ANY HR</div></div>
      <div class="stat"><div class="v ${g.target_score>=70?'hot':''}">${g.target_score ?? '–'}</div><div class="l">TARGET</div></div>
    </div>` : '';
  const prob = (hasModel && !done) ? `<div class="prob-track"><div class="prob-away" style="width:${g.away_win_pct*100}%"></div></div>` : '';
  const pitch = g.away_pitcher ? `<div class="pitchers"><b>${esc(g.away_pitcher)}</b> vs <b>${esc(g.home_pitcher)}</b>${g.home_plate_ump ? ` · Ump: ${esc(g.home_plate_ump)}` : ''}</div>` : '';
  return `<div class="game">
    <div class="g-top">
      <span>${ab(g.away_team)} @ ${ab(g.home_team)} · ${esc(g.venue ?? '')}</span>
      <span>${stateBadge(g)}${g.tier ? `<span class="tier ${g.tier}">${g.tier}</span>` : ''}</span>
    </div>
    ${rows}${prob}${stats}${pitch}</div>`;
}

function renderGames(d){
  const order = {Live:0, Preview:1, Final:2};
  const gs = [...d.games].sort((a,b) =>
    (order[a.game_state] ?? 1) - (order[b.game_state] ?? 1) ||
    new Date(a.game_time) - new Date(b.game_time));
  $('games').innerHTML = gs.map(gameCard).join('') || '<div class="empty">No games today.</div>';
}

function allPlays(d){
  const out = [];
  for (const g of d.games) {
    const gid = `${ab(g.away_team)}@${ab(g.home_team)}`;
    for (const p of (g.prop_plays || [])) out.push({...p, gid, state: g.game_state});
  }
  return out.sort((a,b) => b.edge - a.edge);
}

function renderPlays(d){
  const plays = allPlays(d);
  const markets = ['All', ...new Set(plays.map(p => p.market))];
  const chips = markets.map(m =>
    `<div class="chip ${m===marketFilter?'on':''}" data-m="${esc(m)}">${esc(m)}</div>`).join('');
  const filtered = plays.filter(p => marketFilter==='All' || p.market===marketFilter)
                        .filter(p => p.state !== 'Final');
  const maxEdge = Math.max(...filtered.map(p=>p.edge), 1);
  const list = filtered.slice(0, shown).map(p => `<div class="play">
      <div class="p-main">
        <div class="p-player">${esc(p.name)}</div>
        <div class="p-meta"><span class="side ${esc(p.side)}">${esc(p.side)}</span><b>${esc(p.market)} ${p.line}</b> · ${esc(p.gid)}</div>
      </div>
      <div class="p-edge">
        <div class="edge-val">+${p.edge.toFixed(1)}%</div>
        <div class="edge-bar"><div class="edge-fill" style="width:${(p.edge/maxEdge)*100}%"></div></div>
        <div class="p-odds">${odds(p.book_odds)} · model ${p.model_prob.toFixed(0)}% vs ${p.book_prob.toFixed(0)}%</div>
      </div>
    </div>`).join('');
  const hr = (d.standouts?.top_hr || []).slice(0,5).map(h =>
    `<div class="hr-row"><span><span class="nm">${esc(h.name)}</span><span class="tm">${ab(h.team)}</span></span>
     <span class="pct">${(h.hr_prob*100).toFixed(1)}%</span></div>`).join('');
  $('plays').innerHTML =
    (hr ? `<div class="hr-strip"><div class="hr-title">⚾ HR WATCH</div>${hr}</div>` : '') +
    `<div class="chips">${chips}</div>` +
    (list || '<div class="empty">No live edges for this filter.</div>') +
    (filtered.length > shown ? `<button class="more" id="more">Show ${Math.min(60, filtered.length-shown)} more · ${filtered.length-shown} left</button>` : '');
  document.querySelectorAll('.chip').forEach(c => c.onclick = () => { marketFilter = c.dataset.m; shown = 60; renderPlays(DATA); });
  const mb = $('more'); if (mb) mb.onclick = () => { shown += 60; renderPlays(DATA); };
}

async function load(){
  try {
    const r = await fetch(`../data/mlb_slate.json?t=${Date.now()}`);
    DATA = await r.json();
    $('updated').textContent = 'Updated ' + rel(DATA.generated_at);
    const live = DATA.games.filter(g=>g.game_state==='Live').length;
    $('slate').textContent = `Slate · ${DATA.date} · ${DATA.games.length} games${live ? ` · ${live} live` : ''}`;
    renderGames(DATA);
    renderPlays(DATA);
  } catch(e){ $('updated').textContent = 'Offline'; }
}
load();
setInterval(load, 10*60*1000);
document.addEventListener('visibilitychange', () => { if (!document.hidden) load(); });

document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
  t.classList.add('on');
  $('games').classList.toggle('hide', t.dataset.tab !== 'games');
  $('plays').classList.toggle('hide', t.dataset.tab !== 'plays');
});
if ('serviceWorker' in navigator) navigator.serviceWorker.register('../sw.js');
</script>
</body>
</html>
