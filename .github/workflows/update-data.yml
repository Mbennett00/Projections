name: Update model data

# ── Lean deploy strategy ──────────────────────────────────────────────────
# Netlify's free tier limits BUILD MINUTES (each commit to the repo triggers
# one rebuild). GitHub Actions itself is free/unlimited on public repos, so
# the model can run as often as we like -- we just avoid committing (and thus
# rebuilding Netlify) unless the numbers meaningfully changed.
#
# Result: ~2-3 deploys/day in season instead of ~40. Well under the free cap.

on:
  schedule:
    # MLB: 3 PM ET (afternoon slate lineups posted) + 6 PM ET (evening slate).
    # Lineups post ~1-3h before first pitch, so these hit the sweet spot.
    - cron: "0 19 * * *"        # 3 PM ET
    - cron: "0 22 * * *"        # 6 PM ET
    # NFL: Tue + Sun mornings in season.
    - cron: "0 13 * * 0,2"
    # NHL: 5 PM ET (evening slate, most games 7 PM) in season.
    - cron: "0 21 * * *"
  workflow_dispatch: {}          # manual "Run workflow" button, anytime

permissions:
  contents: write

concurrency:                     # never let two runs stack up
  group: model-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run MLB model
        run: |
          python mlb_projections.py
          cp mlb_slate.json data/mlb_slate.json
        env:
          SGO_API_KEY: ${{ secrets.SGO_API_KEY }}
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
        continue-on-error: true

      - name: Run NFL model
        run: |
          python nfl_projections.py
          cp nfl_slate.json data/nfl_slate.json
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        continue-on-error: true

      - name: Run NHL model
        run: |
          python nhl_projections.py
          cp nhl_slate.json data/nhl_slate.json
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        continue-on-error: true

      - name: Run NBA model
        run: |
          python nba_projections.py
          cp nba_slate.json data/nba_slate.json
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        continue-on-error: true

      # Commit whenever any slate file actually changed. We let git itself
      # decide what changed (via `git status --porcelain`) instead of a
      # hand-rolled diff — the old timestamp-stripping compare was throwing
      # away real lineup updates, leaving the app stuck on stale data.
      # Worst case this is ~4-6 Netlify builds/day, well under the free cap.
      - name: Commit if data changed
        run: |
          git config user.name "slate-bot"
          git config user.email "actions@github.com"

          git add data/*.json

          if git diff --cached --quiet; then
            echo "No file changes — nothing to commit."
          else
            git commit -m "data: model update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "Committed — Netlify will rebuild."
          fi
