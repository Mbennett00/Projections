<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NFL Board — Slate</title>
<meta name="theme-color" content="#0B1020">
<link rel="manifest" href="../manifest.webmanifest">\n<link rel="apple-touch-icon" href="../icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B1020; --card:#141C30; --card-2:#1B2540; --line:#25304E;
  --blue:#6366F1; --yellow:#4ADE80; --red:#FF6B6B; --text:#EEF2FA; --muted:#94A1BE; --r:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg); color:var(--text); font-family:'Inter',system-ui,sans-serif;
  min-height:100dvh; max-width:520px; margin:0 auto; position:relative;
  padding:max(16px,env(safe-area-inset-top)) 16px max(28px,env(safe-area-inset-bottom))}
body::before{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(600px 320px at 12% -6%,rgba(99,102,241,.16),transparent 60%),
             radial-gradient(520px 300px at 108% 4%,rgba(74,222,128,.10),transparent 60%)}
header{display:flex; align-items:center; gap:12px; padding:4px 2px 18px}
.back{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--line);
  display:grid;place-items:center;color:var(--text);text-decoration:none;font-weight:700;flex:none}
h1{font-family:'Sora',sans-serif;font-weight:700;font-size:19px;flex:1;
  background:linear-gradient(100deg,var(--blue),var(--yellow));
  -webkit-background-clip:text;background-clip:text;color:transparent}
.updated{font-size:11.5px;font-weight:600;color:var(--yellow);background:rgba(74,222,128,.1);
  border:1px solid rgba(74,222,128,.22);padding:6px 10px;border-radius:99px;white-space:nowrap}
.tabs{display:flex;gap:7px;margin-bottom:14px}
.tab{flex:none;font-size:12px;font-weight:700;letter-spacing:.03em;color:var(--muted);
  background:var(--card);border:1px solid var(--line);border-radius:99px;
  padding:7px 15px;cursor:pointer;user-select:none;transition:all .15s;line-height:1.3}
.tab.on{color:#0B1020;background:linear-gradient(100deg,var(--blue) 0%,var(--yellow) 90%);border-color:transparent}
.summary{display:flex;gap:8px;flex-wrap:wrap;margin:2px 0 14px}
.sum-chip{font-size:11.5px;font-weight:600;color:var(--text);border-radius:9px;padding:7px 11px;
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(var(--card),var(--card)) padding-box,
             linear-gradient(120deg,rgba(99,102,241,.45),rgba(74,222,128,.45)) border-box;
  border:1px solid transparent}
.sum-chip .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.tag{font-size:8.5px;font-weight:800;letter-spacing:.06em;padding:2px 6px;border-radius:5px;
  display:inline-block;margin-right:4px;margin-top:4px;line-height:1.4}
.rank{width:20px;flex:none;text-align:center;font-family:'Sora',sans-serif;font-weight:800;
  font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.rank.r1{background:linear-gradient(135deg,#4ADE80,#16A34A);-webkit-background-clip:text;background-clip:text;color:transparent}
.rank.r2{color:#C7D2E0}.rank.r3{color:#E0A96D}
.p-avatar{width:46px;height:46px;border-radius:50%;flex:none;overflow:hidden;position:relative;
  display:grid;place-items:center;font-family:'Sora',sans-serif;font-weight:700;font-size:12px}
.p-avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;display:block}
.p-avatar:not(:has(img))::before{content:attr(data-in)}
.play{cursor:pointer;flex-wrap:wrap}
.hr-strip{background:linear-gradient(160deg,var(--card-2),var(--card)) padding-box,
  linear-gradient(140deg,rgba(74,222,128,.55),rgba(99,102,241,.35)) border-box;border:1px solid transparent;
  border-radius:var(--r);padding:13px 16px;margin-bottom:12px;animation:rise .28s ease both}
.hr-title{font-family:'Sora',sans-serif;font-weight:700;font-size:12px;letter-spacing:.12em;color:var(--yellow);margin-bottom:9px}
.hr-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13.5px}
.hr-left{display:flex;align-items:center;gap:9px;min-width:0}
.hr-row .nm{font-weight:600}
.hr-row .tm{color:var(--muted);font-size:11.5px;font-weight:500;margin-left:2px}
.hr-avatar{width:32px;height:32px;border-radius:50%;overflow:hidden;flex:none;position:relative;
  display:grid;place-items:center;font-size:9px;font-weight:700}
.hr-avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;display:block}
.hr-row .pct{font-family:'Sora',sans-serif;font-weight:700;color:var(--yellow);font-variant-numeric:tabular-nums}
.chips{display:flex;gap:7px;overflow-x:auto;padding:2px 2px 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;font-size:12px;font-weight:600;color:var(--muted);background:var(--card);
  border:1px solid var(--line);border-radius:9px;padding:7px 12px;cursor:pointer;user-select:none;white-space:nowrap;line-height:1.2}
.chip.on{color:#0B1020;background:linear-gradient(100deg,var(--blue),var(--yellow));border-color:transparent}
.sim{flex-basis:100%;margin-top:11px;padding-top:11px;border-top:1px dashed var(--line)}
.sim-head{font-size:10.5px;font-weight:700;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between}
.sim-head b{background:linear-gradient(100deg,var(--blue),var(--yellow));-webkit-background-clip:text;background-clip:text;color:transparent}
.sim-row{display:flex;align-items:center;gap:9px;margin-bottom:6px;font-size:12px}
.sim-lab{width:58px;flex:none;color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums}
.sim-bar{flex:1;height:12px;border-radius:6px;background:var(--card-2);overflow:hidden}
.sim-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--blue),var(--yellow));
  transition:width .5s cubic-bezier(.2,.8,.2,1)}
.sim-pct{width:44px;flex:none;text-align:right;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text);font-size:12px}
.sim-hint{font-size:9.5px;font-weight:700;letter-spacing:.06em;color:var(--blue);margin-top:4px}
@keyframes rise{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.game,.play{animation:rise .28s ease both}
.slate-label{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.1em;
  text-transform:uppercase;margin:2px 2px 12px}
.game{border-radius:var(--r);padding:17px 16px 15px;margin-bottom:12px;position:relative;overflow:hidden;
  background:linear-gradient(160deg,var(--card-2),var(--card)) padding-box,
             linear-gradient(150deg,rgba(99,102,241,.4),rgba(37,48,78,.65) 45%,rgba(74,222,128,.3)) border-box;
  border:1px solid transparent}
.g-accent{position:absolute;top:0;left:0;right:0;height:3px}
.g-top{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:11px}
.g-badges{display:inline-flex;align-items:center;gap:6px;flex:none}
.state{font-size:10px;font-weight:700;letter-spacing:.05em;padding:4px 8px;border-radius:7px;
  display:inline-flex;align-items:center;line-height:1.2}
.state.live{color:#0B1020;background:var(--red);animation:pulse 2s infinite}
.state.final{color:var(--muted);background:var(--card-2)}
.state.preview{color:var(--blue);background:rgba(99,102,241,.12)}
@keyframes pulse{50%{opacity:.65}}
.tier{font-size:10px;font-weight:700;letter-spacing:.05em;padding:4px 8px;border-radius:7px;
  display:inline-flex;align-items:center;gap:4px;line-height:1.2}
.tier img{width:13px;height:13px;object-fit:contain}
.tier.STRONG{color:#0B1020;background:var(--yellow)}
.tier.LEAN{color:var(--blue);background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3)}
.tier.PASS{color:var(--muted);background:var(--card-2)}
.team{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.t-name{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px;min-width:0}
.t-abbr{font-family:'Sora',sans-serif;font-weight:700;font-size:11px;
  border-radius:9px;padding:3px;width:34px;height:34px;
  display:grid;place-items:center;text-align:center;flex:none;overflow:hidden}
.t-abbr img{width:26px;height:26px;object-fit:contain;display:block}
.t-abbr:not(:has(img))::before{content:attr(data-ab)}
.t-city{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-num{font-variant-numeric:tabular-nums;font-weight:600;font-size:14px;color:var(--muted);flex:none;margin-left:8px}
.t-num.fav{color:var(--text)}
.prob-track{height:6px;border-radius:99px;background:var(--card-2);margin:11px 0 9px;overflow:hidden;display:flex;gap:2px}
.prob-away{height:100%;transition:width .6s ease}
.prob-home{height:100%;flex:1}
.g-stats{display:flex;gap:6px;margin-top:10px}
.stat{flex:1;border-radius:10px;padding:8px 6px;text-align:center;border-top:2px solid transparent;background:var(--card-2)}
.stat.sb{border-top-color:rgba(99,102,241,.65);background:linear-gradient(180deg,rgba(99,102,241,.10),var(--card-2) 65%)}
.stat.st{border-top-color:rgba(45,212,191,.65);background:linear-gradient(180deg,rgba(45,212,191,.10),var(--card-2) 65%)}
.stat.sy{border-top-color:rgba(74,222,128,.65);background:linear-gradient(180deg,rgba(74,222,128,.10),var(--card-2) 65%)}
.stat .v{font-family:'Sora',sans-serif;font-weight:700;font-size:13.5px;color:var(--text);font-variant-numeric:tabular-nums}
.stat .v.hot{color:var(--yellow)}
.stat .l{font-size:10px;color:var(--muted);font-weight:600;margin-top:2px;letter-spacing:.03em}
.qbs{font-size:12px;color:var(--muted);margin-top:10px;padding-top:9px;border-top:1px solid var(--line);line-height:1.5}
.qbs b{color:var(--text);font-weight:600}
.play{border-radius:var(--r);padding:13px 16px;margin-bottom:9px;display:flex;align-items:center;gap:12px;
  background:linear-gradient(160deg,var(--card-2),var(--card)) padding-box,
             linear-gradient(150deg,rgba(99,102,241,.35),rgba(37,48,78,.65) 50%,rgba(74,222,128,.25)) border-box;
  border:1px solid transparent}
.p-main{flex:1;min-width:0}
.p-player{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-meta{font-size:12px;color:var(--muted);margin-top:3px}
.p-meta b{color:var(--blue);font-weight:600}
.p-edge{text-align:right;flex:none}
.edge-val{font-family:'Sora',sans-serif;font-weight:700;font-size:16px;font-variant-numeric:tabular-nums;
  background:linear-gradient(100deg,var(--yellow),#22C55E);-webkit-background-clip:text;background-clip:text;color:transparent}
.edge-bar{width:60px;height:5px;border-radius:99px;background:var(--card-2);margin-top:5px;overflow:hidden;margin-left:auto}
.edge-fill{height:100%;background:var(--yellow);border-radius:99px}
.p-odds{font-size:11px;color:var(--muted);margin-top:4px;font-variant-numeric:tabular-nums}
.conf{display:flex;align-items:center;gap:11px;margin:4px 0 2px}
.conf-ring{--v:0;--c:var(--yellow);width:44px;height:44px;border-radius:50%;flex:none;position:relative;
  background:conic-gradient(var(--c) calc(var(--v)*1%), var(--card-2) 0);display:grid;place-items:center}
.conf-ring::before{content:'';position:absolute;inset:4px;border-radius:50%;background:var(--card)}
.conf-num{position:relative;font-family:'Sora',sans-serif;font-weight:800;font-size:14px;font-variant-numeric:tabular-nums}
.conf-meta{min-width:0}
.conf-label{font-size:9.5px;font-weight:700;letter-spacing:.09em;color:var(--muted)}
.conf-word{font-family:'Sora',sans-serif;font-weight:700;font-size:13px}
.factors{margin-top:4px}
.factor{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:11px}
.factor-l{width:104px;flex:none;color:var(--muted);font-weight:600}
.factor-bar{flex:1;height:7px;border-radius:4px;background:var(--card-2);overflow:hidden}
.factor-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue),var(--yellow))}
.factor-v{width:30px;flex:none;text-align:right;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text)}
.news{font-size:10.5px;font-weight:700;margin-top:4px;line-height:1.4}
.news.up{color:var(--yellow)}
.news.dn{color:#FF8FA3}
.d-sec{font-size:10.5px;font-weight:700;letter-spacing:.08em;color:var(--muted);margin:10px 0 7px}
.d-match{font-size:12.5px;color:var(--text);background:var(--card-2);border-radius:9px;padding:8px 11px}
.d-line{display:flex;gap:5px;flex-wrap:wrap}
.d-cell{flex:1;min-width:42px;background:var(--card-2);border-radius:9px;padding:7px 3px;text-align:center}
.d-cell .v{font-family:'Sora',sans-serif;font-weight:700;font-size:12.5px;font-variant-numeric:tabular-nums}
.d-cell .l{font-size:8.5px;color:var(--muted);font-weight:700;margin-top:2px;letter-spacing:.03em}
.rankchips{display:flex;gap:6px;flex-wrap:wrap}
.rk{font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:99px;background:var(--card-2);color:var(--muted)}
.rk.on{color:#0B1020;background:linear-gradient(100deg,var(--blue),var(--yellow))}
.rk.top{color:var(--yellow);border:1px solid rgba(74,222,128,.4);background:rgba(74,222,128,.08)}
.pctile{height:8px;border-radius:5px;background:var(--card-2);overflow:hidden;margin-top:8px}
.pctile-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--blue),var(--yellow))}
.pctile-lab{display:flex;justify-content:space-between;font-size:9.5px;color:var(--muted);font-weight:600;margin-top:4px}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:60px 20px}
.hide{display:none}
@media (prefers-reduced-motion:reduce){.prob-away,.sim-fill{transition:none}.state.live,.game,.play{animation:none}}
</style>
</head>
<body>
<header>
  <a class="back" href="../">←</a>
  <h1>NFL Board</h1>
  <span class="updated" id="updated">…</span>
</header>

<div class="tabs">
  <div class="tab on" data-tab="games">Slate</div>
  <div class="tab" data-tab="plays">Numbers</div>
</div>

<div class="slate-label" id="slate"></div>
<div id="games"></div>
<div id="plays" class="hide"></div>

<script>
const $ = id => document.getElementById(id);
const ABBR = {"Arizona Cardinals":"ARI","Atlanta Falcons":"ATL","Baltimore Ravens":"BAL","Buffalo Bills":"BUF","Carolina Panthers":"CAR","Chicago Bears":"CHI","Cincinnati Bengals":"CIN","Cleveland Browns":"CLE","Dallas Cowboys":"DAL","Denver Broncos":"DEN","Detroit Lions":"DET","Green Bay Packers":"GB","Houston Texans":"HOU","Indianapolis Colts":"IND","Jacksonville Jaguars":"JAX","Kansas City Chiefs":"KC","Las Vegas Raiders":"LV","Los Angeles Chargers":"LAC","Los Angeles Rams":"LAR","Miami Dolphins":"MIA","Minnesota Vikings":"MIN","New England Patriots":"NE","New Orleans Saints":"NO","New York Giants":"NYG","New York Jets":"NYJ","Philadelphia Eagles":"PHI","Pittsburgh Steelers":"PIT","San Francisco 49ers":"SF","Seattle Seahawks":"SEA","Tampa Bay Buccaneers":"TB","Tennessee Titans":"TEN","Washington Commanders":"WSH"};
const ab = n => ABBR[n] || (n||'').split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase();
const TC = {ARI:'#B0325B',ATL:'#C8283C',BAL:'#7A5FD0',BUF:'#3B6EDC',CAR:'#0085CA',CHI:'#E05A2B',CIN:'#FB4F14',CLE:'#FF3C00',DAL:'#4A7CD6',DEN:'#FB4F14',DET:'#0076B6',GB:'#57A05C',HOU:'#C42B45',IND:'#3F76D2',JAX:'#12A5BC',KC:'#E31837',LV:'#B8C4CA',LAC:'#0080C6',LAR:'#3F6FE0',MIA:'#00A5A0',MIN:'#8A63D2',NE:'#C8102E',NO:'#D3BC8D',NYG:'#4A6FD6',NYJ:'#1FA37A',PHI:'#1FA394',PIT:'#FFB612',SF:'#C42B2B',SEA:'#69BE28',TB:'#D50A0A',TEN:'#4B92DB',WSH:'#B04545'};
const tc = a => TC[a] || '#6366F1';
const abSpan = a => `<b style="color:${tc(a)}">${a}</b>`;
const logo = a => `https://a.espncdn.com/i/teamlogos/nfl/500/${(a||'').toLowerCase()}.png`;
const badge = a => `<span class="t-abbr" data-ab="${a}" style="color:${tc(a)};background:${tc(a)}1E;border:1px solid ${tc(a)}55"><img src="${logo(a)}" alt="" loading="lazy" onerror="this.remove()"></span>`;
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const rel = iso => {
  const m = Math.round((Date.now() - new Date(iso)) / 60000);
  if (isNaN(m)) return '';
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.round(m/60);
  return h < 24 ? h + 'h ago' : Math.round(h/24) + 'd ago';
};
const kickoff = iso => new Date(iso).toLocaleString('en-US',{weekday:'short',hour:'numeric',minute:'2-digit'});
const odds = v => v == null ? '–' : (v > 0 ? '+' + Math.round(v) : String(Math.round(v)));
const spr = v => v == null ? '–' : (v > 0 ? '+' + v : String(v));
const pct = v => (v*100).toFixed(0) + '%';

let DATA = null;

function stateBadge(g){
  if (g.game_state === 'Live') return `<span class="state live">LIVE</span>`;
  if (g.game_state === 'Final') return `<span class="state final">FINAL</span>`;
  return `<span class="state preview">${esc(kickoff(g.game_time))}</span>`;
}

function gameCard(g){
  const L = g._lines || {};
  const aFav = (g.away_win_pct ?? 0) >= (g.home_win_pct ?? 0);
  const rows = ['away','home'].map(s => `<div class="team">
      <span class="t-name">${badge(ab(g[s+'_team']))}<span class="t-city">${esc(g[s+'_team'])}</span></span>
      <span class="t-num ${((s==='away')===aFav)?'fav':''}">${g[s+'_pts']?.toFixed(1) ?? '–'} · ${pct(g[s+'_win_pct'] ?? 0)}</span>
    </div>`).join('');
  const homeCover = (g.p_cover ?? .5) >= .5;
  const leanTeam = homeCover ? ab(g.home_team) : ab(g.away_team);
  const leanNum = L.spread != null ? spr(homeCover ? L.spread : -L.spread) : '';
  const coverP = homeCover ? (g.p_cover ?? .5) : 1 - (g.p_cover ?? .5);
  const overSide = (g.p_over ?? .5) >= .5;
  const totP = overSide ? (g.p_over ?? .5) : 1 - (g.p_over ?? .5);
  const cA = tc(ab(g.away_team)), cH = tc(ab(g.home_team));
  const favLogo = (aFav ? ab(g.away_team) : ab(g.home_team));
  const tierHtml = g.tier ? `<span class="tier ${g.tier}"><img src="${logo(favLogo)}" alt="" loading="lazy" onerror="this.remove()">${g.tier}</span>` : '';
  return `<div class="game">
    <div class="g-accent" style="background:linear-gradient(90deg,${cA},${cH})"></div>
    <div class="g-top">
      <span>${abSpan(ab(g.away_team))} @ ${abSpan(ab(g.home_team))}</span>
      <span class="g-badges">${stateBadge(g)}${tierHtml}</span>
    </div>
    ${rows}
    <div class="prob-track"><div class="prob-away" style="width:${(g.away_win_pct ?? .5)*100}%;background:${cA}"></div><div class="prob-home" style="background:${cH}"></div></div>
    <div class="g-stats">
      <div class="stat sb"><div class="v ${coverP>=.55?'hot':''}">${leanTeam} ${leanNum}</div><div class="l">COVER ${pct(coverP)}</div></div>
      <div class="stat sy"><div class="v ${totP>=.55?'hot':''}">${overSide ? 'Ov' : 'Un'} ${L.total ?? '–'}</div><div class="l">TOTAL ${pct(totP)}</div></div>
      <div class="stat st"><div class="v">${g.away_pts?.toFixed(0) ?? '–'}–${g.home_pts?.toFixed(0) ?? '–'}</div><div class="l">PROJ</div></div>
    </div>
    ${g.away_qb ? `<div class="qbs"><b>${esc(g.away_qb)}</b> ${g.away_qb_proj ? `(${g.away_qb_proj.pass_yds?.toFixed(0)} yds, ${g.away_qb_proj.pass_td?.toFixed(1)} TD)` : ''} vs <b>${esc(g.home_qb)}</b> ${g.home_qb_proj ? `(${g.home_qb_proj.pass_yds?.toFixed(0)} yds, ${g.home_qb_proj.pass_td?.toFixed(1)} TD)` : ''}</div>` : ''}
  </div>`;
}

function renderGames(d){
  const order = {Live:0, Preview:1, Final:2};
  const gs = [...d.games].sort((a,b) =>
    (order[a.game_state] ?? 1) - (order[b.game_state] ?? 1) ||
    new Date(a.game_time) - new Date(b.game_time));
  $('games').innerHTML = gs.map(gameCard).join('') || '<div class="empty">No games this week.</div>';
}

// QB projections across the slate, ranked by projected passing yards.
// Skill-position players appear automatically once the model fills
// away_skill / home_skill with projection fields.
// ---- NFL avatars: primary fill / secondary ring + ESPN headshots ----
const AV = {ARI:['#97233F','#FFB612'],ATL:['#A71930','#A5ACAF'],BAL:['#241773','#9E7C0C'],BUF:['#00338D','#C60C30'],CAR:['#0085CA','#101820'],CHI:['#0B162A','#C83803'],CIN:['#FB4F14','#101820'],CLE:['#311D00','#FF3C00'],DAL:['#003594','#869397'],DEN:['#FB4F14','#002244'],DET:['#0076B6','#B0B7BC'],GB:['#203731','#FFB612'],HOU:['#03202F','#A71930'],IND:['#002C5F','#A2AAAD'],JAX:['#006778','#9F792C'],KC:['#E31837','#FFB81C'],LV:['#000000','#A5ACAF'],LAC:['#0080C6','#FFC20E'],LAR:['#003594','#FFA300'],MIA:['#008E97','#FC4C02'],MIN:['#4F2683','#FFC62F'],NE:['#002244','#C60C30'],NO:['#101820','#D3BC8D'],NYG:['#0B2265','#A71930'],NYJ:['#125740','#F5F0E1'],PHI:['#004C54','#A5ACAF'],PIT:['#101820','#FFB612'],SF:['#AA0000','#B3995D'],SEA:['#002244','#69BE28'],TB:['#D50A0A','#B1BABF'],TEN:['#0C2340','#4B92DB'],WSH:['#5A1414','#FFB612']};
const mug = id => `https://a.espncdn.com/i/headshots/nfl/players/full/${id}.png`;
const initials = n => (n||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const avatar = (name, team, id, cls='p-avatar') => {
  const [bg, ring] = AV[team] || ['#1B2540','#6366F1'];
  return `<span class="${cls}" data-in="${initials(name)}" style="background:${bg};border:2px solid ${ring};color:#F5F0E1">${id ? `<img src="${mug(id)}" alt="" loading="lazy" onerror="this.remove()">` : ''}</span>`;
};

// ---- tags ----
function nflTags(p, pool){
  const t = [];
  if (pool === 'qb') {
    if ((p.pass_yds ?? 0) >= 250) t.push(['GUNSLINGER','#6366F1']);
    if ((p.pass_td ?? 0) >= 1.8) t.push(['TD UPSIDE','#4ADE80']);
    if ((p.rating ?? 0) >= 92) t.push(['EFFICIENT','#2DD4BF']);
  } else {
    const pos = (p.pos || '').toUpperCase();
    if ((p.rush_att ?? 0) >= 15) t.push(['BELLCOW','#FB923C']);
    if ((p.targets ?? 0) >= 8) t.push(['TARGET HOG','#6366F1']);
    if ((p.fpts ?? 0) >= 15) t.push(['FANTASY STUD','#FDE047']);
    if ((p.td_prob ?? 0) >= .5) t.push(['RED ZONE THREAT','#F87171']);
    if (pos === 'RB' && (p.td_prob ?? 0) >= .55) t.push(['GOAL LINE BACK','#EF4444']);
    if (pos === 'RB' && (p.targets ?? 0) >= 5 && (p.rush_att ?? 0) >= 10) t.push(['DUAL THREAT','#2DD4BF']);
    if ((pos === 'WR' || pos === 'TE') && (p.targets ?? 0) >= 1 && ((p.rec_yds ?? 0) / Math.max(1, p.rec ?? 1)) >= 14) t.push(['DEEP THREAT','#A78BFA']);
    if (pos === 'WR' && (p.targets ?? 0) >= 9) t.push(['WR1','#4ADE80']);
  }
  return t.slice(0,3).map(([n,c]) =>
    `<span class="tag" style="color:${c};background:${c}1C;border:1px solid ${c}44">${n}</span>`).join('');
}

// ---- sims ----
const gauss = (m, s) => { let u=0,v=0; while(!u)u=Math.random(); while(!v)v=Math.random();
  return m + s * Math.sqrt(-2*Math.log(u)) * Math.cos(2*Math.PI*v); };
const pois = l => { const L=Math.exp(-l); let k=0,p=1; do{k++;p*=Math.random()}while(p>L); return k-1; };
let openSim = null, marketFilter = 'Pass Yds';
const SIMCACHE = {};
function bucketSim(key, sampler, buckets){
  if (SIMCACHE[key]) return SIMCACHE[key];
  const N = 10000, counts = new Array(buckets.length).fill(0);
  for (let i = 0; i < N; i++){
    const v = sampler();
    for (let b = 0; b < buckets.length; b++) if (buckets[b][1](v)) { counts[b]++; break; }
  }
  return SIMCACHE[key] = buckets.map(([lab], i) => [lab, counts[i] / N]);
}
const YD_BUCKETS = [['<40',v=>v<40],['40-69',v=>v<70],['70-99',v=>v<100],['100+',v=>v>=100]];
const MARKETS = {
  'Pass Yds': {pool:'qb', v:p=>p.pass_yds, fmt:v=>v.toFixed(0)+' yds',
    sub:p=>`${(p.pass_td??0).toFixed(1)} TD · ${(p.int??0).toFixed(1)} INT · ${(p.rating??0).toFixed(0)} rate`,
    sim:p=>bucketSim('py'+p.name+p.pass_yds, ()=>gauss(p.pass_yds, p.pass_yds*.21),
      [['<200',v=>v<200],['200-249',v=>v<250],['250-299',v=>v<300],['300+',v=>v>=300]]), lab:'PASS YDS'},
  'Rush Yds': {pool:'skill', v:p=>p.rush_yds, min:p=>(p.rush_yds??0)>=10, fmt:v=>v.toFixed(0)+' yds',
    sub:p=>`${p.pos??''} · ${(p.rush_att??0).toFixed(0)} att · ${((p.td_prob??0)*100).toFixed(0)}% TD`,
    sim:p=>bucketSim('ru'+p.name+p.rush_yds, ()=>gauss(p.rush_yds, Math.max(12, p.rush_yds*.4)), YD_BUCKETS), lab:'RUSH YDS'},
  'Rec Yds': {pool:'skill', v:p=>p.rec_yds, min:p=>(p.rec_yds??0)>=10, fmt:v=>v.toFixed(0)+' yds',
    sub:p=>`${p.pos??''} · ${(p.rec??0).toFixed(1)} rec · ${(p.targets??0).toFixed(1)} tgt`,
    sim:p=>bucketSim('re'+p.name+p.rec_yds, ()=>gauss(p.rec_yds, Math.max(12, p.rec_yds*.4)), YD_BUCKETS), lab:'REC YDS'},
  'Receptions': {pool:'skill', v:p=>p.rec, min:p=>(p.rec??0)>=1, fmt:v=>v.toFixed(1),
    sub:p=>`${p.pos??''} · ${(p.targets??0).toFixed(1)} tgt · ${(p.rec_yds??0).toFixed(0)} yds`,
    sim:p=>bucketSim('rc'+p.name+p.rec, ()=>pois(p.rec),
      [['0-2',v=>v<=2],['3-4',v=>v<=4],['5-6',v=>v<=6],['7+',v=>v>=7]]), lab:'RECEPTIONS'},
  'TD': {pool:'skill', v:p=>p.td_prob, min:p=>(p.td_prob??0)>=.1, fmt:v=>(v*100).toFixed(0)+'%',
    sub:p=>`${p.pos??''} · anytime TD · ${(p.fpts??0).toFixed(1)} fpts`,
    sim:p=>bucketSim('td'+p.name+p.td_prob, ()=>Math.random()<p.td_prob?1:0,
      [['TD ✓',v=>v===1],['No TD',v=>v===0]]), lab:'ANYTIME TD'}
};

function collect(d){
  const qb = [], skill = [];
  for (const g of d.games){
    if (g.game_state === 'Final') continue;
    for (const [side, opp] of [['away', ab(g.home_team)],['home', ab(g.away_team)]]){
      const team = ab(g[side+'_team']);
      const q = g[side+'_qb_proj'];
      if (q && typeof q.pass_yds === 'number') qb.push({...q, team, opp});
      for (const s of (g[side+'_skill'] || [])) skill.push({...s, team, opp});
    }
  }
  return {qb, skill};
}

function renderPlays(d){
  const {qb, skill} = collect(d);
  const cfg = MARKETS[marketFilter];
  const pool = (cfg.pool === 'qb' ? qb : skill)
    .filter(p => typeof cfg.v(p) === 'number' && (!cfg.min || cfg.min(p)))
    .sort((a,b) => cfg.v(b) - cfg.v(a));

  const RANKS = {};
  for (const [m, c] of Object.entries(MARKETS)) {
    const pl = (c.pool === 'qb' ? qb : skill)
      .filter(p => typeof c.v(p) === 'number' && (!c.min || c.min(p)))
      .sort((a,b) => c.v(b) - c.v(a));
    const mp = new Map();
    pl.forEach((p, i) => mp.set(p.name + '|' + p.team, i + 1));
    RANKS[m] = {map: mp, n: pl.length};
  }

  const clamp01 = x => Math.max(0, Math.min(1, x));
const confWord = s => s >= 85 ? 'Elite' : s >= 72 ? 'Strong' : s >= 58 ? 'Solid' : s >= 44 ? 'Moderate' : 'Volatile';
const confColor = s => s >= 72 ? 'var(--yellow)' : s >= 55 ? 'var(--blue)' : '#FB923C';
function confBlock(c){
  if (!c) return '';
  const bars = c.factors.map(([l,v]) =>
    `<div class="factor"><span class="factor-l">${l}</span>
      <div class="factor-bar"><div class="factor-fill" style="width:${(v*100).toFixed(0)}%"></div></div>
      <span class="factor-v">${Math.round(v*100)}</span></div>`).join('');
  return `<div class="d-sec">CONFIDENCE · ${c.factors.length} factors</div><div class="factors">${bars}</div>`;
}
const confRing = c => c ? `<div class="conf" style="justify-content:flex-end"><div class="conf-ring" style="--v:${c.score};--c:${confColor(c.score)}"><span class="conf-num">${c.score}</span></div></div>` : '';
const confHeader = c => c ? `<div class="conf"><div class="conf-ring" style="--v:${c.score};--c:${confColor(c.score)}"><span class="conf-num">${c.score}</span></div><div class="conf-meta"><div class="conf-label">CONFIDENCE</div><div class="conf-word" style="color:${confColor(c.score)}">${confWord(c.score)} · ${c.score}/100</div></div></div>` : '';
function nflConfidence(p, isQB){
  // NFL preseason runs on priors -- score only what's real, lower ceiling honestly
  const f = [];
  if (isQB){
    if (p.pass_yds != null) f.push(['Volume', clamp01((p.pass_yds - 150) / 130)]);
    if (p.rating != null)   f.push(['Efficiency', clamp01((p.rating - 70) / 40)]);
    if (p.comp_pct != null) f.push(['Accuracy', clamp01((p.comp_pct - 55) / 20)]);
  } else {
    if (p.targets != null || p.rush_att != null)
      f.push(['Usage', clamp01(((p.targets||0) + (p.rush_att||0)) / 20)]);
    if (p.fpts != null)     f.push(['Projected role', clamp01(p.fpts / 20)]);
    if (p.td_prob != null)  f.push(['Scoring chance', clamp01(p.td_prob / .7)]);
  }
  // sample honesty: priors cap confidence lower than in-season data
  if (p.src === 'prior')       f.push(['Sample (prior yr)', 0.45]);
  else if (p.src === 'blend')  f.push(['Sample (blended)', 0.75]);
  else if (p.src === 'current')f.push(['Sample (current)', 0.92]);
  if (p.status === 'Q') f.push(['Health', 0.45]);
  else if (p.status === 'D') f.push(['Health', 0.25]);
  if (!f.length) return null;
  const score = Math.round(f.reduce((s,[,v]) => s + v, 0) / f.length * 100);
  return {score, factors: f};
}

  const statusTag = p => {
    if (p.status === 'Q') return `<span class="tag" style="color:#FBBF24;background:#FBBF241C;border:1px solid #FBBF2444">QUESTIONABLE</span>`;
    if (p.status === 'D') return `<span class="tag" style="color:#FB923C;background:#FB923C1C;border:1px solid #FB923C44">DOUBTFUL</span>`;
    return '';
  };
  function newsLine(p){
    if (p.news) return `<div class="news up">↑ ${esc(p.news.reason)} · ${p.news.fpts_from} → ${p.news.fpts_to} fpts</div>`;
    if (p.fpts_prev != null) {
      const up = (p.fpts ?? 0) >= p.fpts_prev;
      return `<div class="news ${up?'up':'dn'}">${up?'↑':'↓'} Projection ${up?'increased':'decreased'} · ${p.fpts_prev} → ${p.fpts} fpts</div>`;
    }
    return '';
  }

  function detailPanel(p){
    const isQB = cfg.pool === 'qb';
    const cells = (isQB
      ? [['CMP%', p.comp_pct, 1], ['YDS', p.pass_yds, 0], ['TD', p.pass_td, 1], ['INT', p.int, 1], ['RATE', p.rating, 0]]
      : [['TGT', p.targets, 1], ['REC', p.rec, 1], ['RC YD', p.rec_yds, 0], ['ATT', p.rush_att, 1],
         ['RU YD', p.rush_yds, 0], ['TD%', (p.td_prob ?? 0) * 100, 0], ['FPTS', p.fpts, 1]])
      .map(([l, v, dp]) => `<div class="d-cell"><div class="v">${(v ?? 0).toFixed(dp)}</div><div class="l">${l}</div></div>`).join('');
    const key = p.name + '|' + p.team;
    const rankChips = Object.entries(MARKETS)
      .filter(([, c]) => c.pool === cfg.pool)
      .map(([m]) => {
        const r = RANKS[m].map.get(key);
        return r ? `<span class="rk ${m === marketFilter ? 'on' : (r <= 3 ? 'top' : '')}">${m} #${r}</span>` : '';
      }).join('');
    const r = RANKS[marketFilter].map.get(key) ?? 1, n = RANKS[marketFilter].n || 1;
    const pctl = Math.round((1 - (r - 1) / n) * 100);
    const simRows = cfg.sim(p).map(([lab, pr]) =>
      `<div class="sim-row"><span class="sim-lab">${lab}</span>
        <div class="sim-bar"><div class="sim-fill" style="width:${(pr*100).toFixed(1)}%"></div></div>
        <span class="sim-pct">${(pr*100).toFixed(1)}%</span></div>`).join('');
    const conf = nflConfidence(p, isQB);
    return `<div class="sim">
      ${confHeader(conf)}${confBlock(conf)}
      <div class="d-sec">MATCHUP</div>
      <div class="d-match">vs ${abSpan(p.opp)}${p.src ? ` · projection source: ${p.src}` : ''}</div>
      <div class="d-sec">PROJECTED LINE VS ${p.opp}</div>
      <div class="d-line">${cells}</div>
      <div class="d-sec">SLATE RANKS</div>
      <div class="rankchips">${rankChips}</div>
      <div class="pctile"><div class="pctile-fill" style="width:${pctl}%"></div></div>
      <div class="pctile-lab"><span>#${r} of ${n} in ${marketFilter}</span><span>top ${Math.max(1, Math.round(r / n * 100))}%</span></div>
      <div class="sim-head" style="margin-top:12px"><span>MONTE CARLO · ${cfg.lab}</span><b>10,000 SIMS</b></div>${simRows}
    </div>`;
  }

  const chips = Object.keys(MARKETS).map(m =>
    `<div class="chip ${m===marketFilter?'on':''}" data-m="${m}">${m}</div>`).join('');
  const list = pool.slice(0, 40).map((p,i) => {
    const key = marketFilter + '|' + p.name, open = openSim === key;
    return `<div class="play" data-key="${esc(key)}">
      <span class="rank ${i<3?'r'+(i+1):''}">${i+1}</span>
      ${avatar(p.name, p.team, p.player_id)}
      <div class="p-main">
        <div class="p-player">${esc(p.name)}</div>
        <div class="p-meta">${abSpan(p.team)} vs ${abSpan(p.opp)}</div>
        <div>${statusTag(p)}${nflTags(p, cfg.pool)}</div>
        ${newsLine(p)}
      </div>
      <div class="p-edge">
        <div class="edge-val">${cfg.fmt(cfg.v(p))}</div>
        ${confRing(nflConfidence(p, cfg.pool === 'qb'))}
        <div class="sim-hint">${open ? '▾ CLOSE' : '▸ DETAILS'}</div>
      </div>
      ${open ? detailPanel(p) : ''}
    </div>`;
  }).join('');
  const emptyMsg = cfg.pool === 'skill'
    ? '<div class="empty">Skill-position projections populate once the season starts and usage data exists.<br>QBs are live now under Pass Yds.</div>'
    : '<div class="empty">No projections for this slate yet.</div>';
  const tdTop = [...skill].filter(p => typeof p.td_prob === 'number')
    .sort((a,b) => b.td_prob - a.td_prob).slice(0, 5);
  const tdWatch = tdTop.length ? `<div class="hr-strip"><div class="hr-title">TD WATCH</div>` +
    tdTop.map(p => `<div class="hr-row"><span class="hr-left">${avatar(p.name, p.team, p.player_id, 'hr-avatar')}<span class="nm">${esc(p.name)}</span><span class="tm">${abSpan(p.team)}</span></span><span class="pct">${(p.td_prob*100).toFixed(0)}%</span></div>`).join('') + `</div>` : '';
  $('plays').innerHTML = tdWatch + `<div class="chips">${chips}</div>` + (list || emptyMsg);
  document.querySelectorAll('.chip').forEach(c => c.onclick = () => { marketFilter = c.dataset.m; openSim = null; renderPlays(DATA); });
  document.querySelectorAll('.play[data-key]').forEach(el => el.onclick = () => {
    openSim = (openSim === el.dataset.key) ? null : el.dataset.key;
    renderPlays(DATA);
  });
}

async function load(){
  try {
    const r = await fetch(`../data/nfl_slate.json?t=${Date.now()}`);
    DATA = await r.json();
    $('updated').textContent = 'Updated ' + rel(DATA.generated_at);
    const strong = DATA.games.filter(g=>g.tier==='STRONG').length;
    $('slate').className = 'summary';
    $('slate').innerHTML =
      `<span class="sum-chip"><span class="dot" style="background:var(--blue)"></span>${DATA.games.length} games</span>` +
      (strong ? `<span class="sum-chip"><span class="dot" style="background:var(--yellow)"></span>${strong} strong</span>` : '') +
      `<span class="sum-chip"><span class="dot" style="background:#2DD4BF"></span>${DATA.date}</span>`;
    renderGames(DATA);
    renderPlays(DATA);
  } catch(e){ $('updated').textContent = 'Offline'; }
}
load();
setInterval(load, 10*60*1000);
document.addEventListener('visibilitychange', () => { if (!document.hidden) load(); });

document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
  t.classList.add('on');
  $('games').classList.toggle('hide', t.dataset.tab !== 'games');
  $('plays').classList.toggle('hide', t.dataset.tab !== 'plays');
});
if ('serviceWorker' in navigator) navigator.serviceWorker.register('../sw.js');
</script>
</body>
