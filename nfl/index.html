<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NFL Board — Slate</title>
<meta name="theme-color" content="#0B1020">
<link rel="manifest" href="../manifest.webmanifest">\n<link rel="apple-touch-icon" href="../icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B1020; --card:#141C30; --card-2:#1B2540; --line:#25304E;
  --blue:#4C8DFF; --yellow:#FFD34D; --red:#FF6B6B; --text:#EEF2FA; --muted:#94A1BE; --r:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg); color:var(--text); font-family:'Inter',system-ui,sans-serif;
  min-height:100dvh; max-width:520px; margin:0 auto; position:relative;
  padding:max(16px,env(safe-area-inset-top)) 16px max(28px,env(safe-area-inset-bottom))}
body::before{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(600px 320px at 12% -6%,rgba(76,141,255,.16),transparent 60%),
             radial-gradient(520px 300px at 108% 4%,rgba(255,211,77,.10),transparent 60%)}
header{display:flex; align-items:center; gap:12px; padding:4px 2px 18px}
.back{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--line);
  display:grid;place-items:center;color:var(--text);text-decoration:none;font-weight:700;flex:none}
h1{font-family:'Sora',sans-serif;font-weight:700;font-size:19px;flex:1;
  background:linear-gradient(100deg,var(--blue),var(--yellow));
  -webkit-background-clip:text;background-clip:text;color:transparent}
.updated{font-size:11.5px;font-weight:600;color:var(--yellow);background:rgba(255,211,77,.1);
  border:1px solid rgba(255,211,77,.22);padding:6px 10px;border-radius:99px;white-space:nowrap}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{flex:1;text-align:center;font-size:13.5px;font-weight:600;color:var(--muted);
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:11px 0;cursor:pointer;user-select:none;transition:all .15s}
.tab.on{color:#0B1020;background:linear-gradient(100deg,var(--blue) 0%,var(--yellow) 90%);border-color:transparent}
.summary{display:flex;gap:8px;flex-wrap:wrap;margin:2px 0 14px}
.sum-chip{font-size:11.5px;font-weight:600;color:var(--text);background:var(--card);
  border:1px solid var(--line);border-radius:9px;padding:7px 11px;display:inline-flex;align-items:center;gap:6px}
.sum-chip .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.tag{font-size:8.5px;font-weight:800;letter-spacing:.06em;padding:2px 6px;border-radius:5px;
  display:inline-block;margin-right:4px;margin-top:4px;line-height:1.4}
.rank{width:20px;flex:none;text-align:center;font-family:'Sora',sans-serif;font-weight:800;
  font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.rank.r1{background:linear-gradient(135deg,#FFD34D,#FF9F1C);-webkit-background-clip:text;background-clip:text;color:transparent}
.rank.r2{color:#C7D2E0}.rank.r3{color:#E0A96D}
.play{cursor:pointer;flex-wrap:wrap}
.sim{flex-basis:100%;margin-top:11px;padding-top:11px;border-top:1px dashed var(--line)}
.sim-head{font-size:10.5px;font-weight:700;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between}
.sim-head b{background:linear-gradient(100deg,var(--blue),var(--yellow));-webkit-background-clip:text;background-clip:text;color:transparent}
.sim-row{display:flex;align-items:center;gap:9px;margin-bottom:6px;font-size:12px}
.sim-lab{width:58px;flex:none;color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums}
.sim-bar{flex:1;height:12px;border-radius:6px;background:var(--card-2);overflow:hidden}
.sim-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--blue),var(--yellow));
  transition:width .5s cubic-bezier(.2,.8,.2,1)}
.sim-pct{width:44px;flex:none;text-align:right;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text);font-size:12px}
.sim-hint{font-size:9.5px;font-weight:700;letter-spacing:.06em;color:var(--blue);margin-top:4px}
@keyframes rise{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.game,.play{animation:rise .28s ease both}
.slate-label{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.1em;
  text-transform:uppercase;margin:2px 2px 12px}
.game{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:17px 16px 15px;margin-bottom:12px;position:relative;overflow:hidden}
.g-accent{position:absolute;top:0;left:0;right:0;height:3px}
.g-top{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:11px}
.g-badges{display:inline-flex;align-items:center;gap:6px;flex:none}
.state{font-size:10px;font-weight:700;letter-spacing:.05em;padding:4px 8px;border-radius:7px;
  display:inline-flex;align-items:center;line-height:1.2}
.state.live{color:#0B1020;background:var(--red);animation:pulse 2s infinite}
.state.final{color:var(--muted);background:var(--card-2)}
.state.preview{color:var(--blue);background:rgba(76,141,255,.12)}
@keyframes pulse{50%{opacity:.65}}
.tier{font-size:10px;font-weight:700;letter-spacing:.05em;padding:4px 8px;border-radius:7px;
  display:inline-flex;align-items:center;gap:4px;line-height:1.2}
.tier img{width:13px;height:13px;object-fit:contain}
.tier.STRONG{color:#0B1020;background:var(--yellow)}
.tier.LEAN{color:var(--blue);background:rgba(76,141,255,.12);border:1px solid rgba(76,141,255,.3)}
.tier.PASS{color:var(--muted);background:var(--card-2)}
.team{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.t-name{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px;min-width:0}
.t-abbr{font-family:'Sora',sans-serif;font-weight:700;font-size:11px;
  border-radius:9px;padding:3px;width:34px;height:34px;
  display:grid;place-items:center;text-align:center;flex:none;overflow:hidden}
.t-abbr img{width:26px;height:26px;object-fit:contain;display:block}
.t-abbr:not(:has(img))::before{content:attr(data-ab)}
.t-city{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-num{font-variant-numeric:tabular-nums;font-weight:600;font-size:14px;color:var(--muted);flex:none;margin-left:8px}
.t-num.fav{color:var(--text)}
.prob-track{height:6px;border-radius:99px;background:var(--card-2);margin:11px 0 9px;overflow:hidden;display:flex;gap:2px}
.prob-away{height:100%;transition:width .6s ease}
.prob-home{height:100%;flex:1}
.g-stats{display:flex;gap:6px;margin-top:10px}
.stat{flex:1;background:var(--card-2);border-radius:10px;padding:8px 6px;text-align:center;border-top:2px solid transparent}
.stat.sb{border-top-color:rgba(76,141,255,.6)}.stat.st{border-top-color:rgba(45,212,191,.6)}.stat.sy{border-top-color:rgba(255,211,77,.6)}
.stat .v{font-family:'Sora',sans-serif;font-weight:700;font-size:13.5px;color:var(--text);font-variant-numeric:tabular-nums}
.stat .v.hot{color:var(--yellow)}
.stat .l{font-size:10px;color:var(--muted);font-weight:600;margin-top:2px;letter-spacing:.03em}
.qbs{font-size:12px;color:var(--muted);margin-top:10px;padding-top:9px;border-top:1px solid var(--line);line-height:1.5}
.qbs b{color:var(--text);font-weight:600}
.play{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:13px 16px;margin-bottom:9px;display:flex;align-items:center;gap:12px}
.p-main{flex:1;min-width:0}
.p-player{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-meta{font-size:12px;color:var(--muted);margin-top:3px}
.p-meta b{color:var(--blue);font-weight:600}
.p-edge{text-align:right;flex:none}
.edge-val{font-family:'Sora',sans-serif;font-weight:700;font-size:16px;color:var(--yellow);font-variant-numeric:tabular-nums}
.edge-bar{width:60px;height:5px;border-radius:99px;background:var(--card-2);margin-top:5px;overflow:hidden;margin-left:auto}
.edge-fill{height:100%;background:var(--yellow);border-radius:99px}
.p-odds{font-size:11px;color:var(--muted);margin-top:4px;font-variant-numeric:tabular-nums}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:60px 20px}
.hide{display:none}
@media (prefers-reduced-motion:reduce){.prob-away,.sim-fill{transition:none}.state.live,.game,.play{animation:none}}
</style>
</head>
<body>
<header>
  <a class="back" href="../">←</a>
  <h1>NFL Board</h1>
  <span class="updated" id="updated">…</span>
</header>

<div class="tabs">
  <div class="tab on" data-tab="games">Games</div>
  <div class="tab" data-tab="plays">Projections</div>
</div>

<div class="slate-label" id="slate"></div>
<div id="games"></div>
<div id="plays" class="hide"></div>

<script>
const $ = id => document.getElementById(id);
const ABBR = {"Arizona Cardinals":"ARI","Atlanta Falcons":"ATL","Baltimore Ravens":"BAL","Buffalo Bills":"BUF","Carolina Panthers":"CAR","Chicago Bears":"CHI","Cincinnati Bengals":"CIN","Cleveland Browns":"CLE","Dallas Cowboys":"DAL","Denver Broncos":"DEN","Detroit Lions":"DET","Green Bay Packers":"GB","Houston Texans":"HOU","Indianapolis Colts":"IND","Jacksonville Jaguars":"JAX","Kansas City Chiefs":"KC","Las Vegas Raiders":"LV","Los Angeles Chargers":"LAC","Los Angeles Rams":"LAR","Miami Dolphins":"MIA","Minnesota Vikings":"MIN","New England Patriots":"NE","New Orleans Saints":"NO","New York Giants":"NYG","New York Jets":"NYJ","Philadelphia Eagles":"PHI","Pittsburgh Steelers":"PIT","San Francisco 49ers":"SF","Seattle Seahawks":"SEA","Tampa Bay Buccaneers":"TB","Tennessee Titans":"TEN","Washington Commanders":"WSH"};
const ab = n => ABBR[n] || (n||'').split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase();
const TC = {ARI:'#B0325B',ATL:'#C8283C',BAL:'#7A5FD0',BUF:'#3B6EDC',CAR:'#0085CA',CHI:'#E05A2B',CIN:'#FB4F14',CLE:'#FF3C00',DAL:'#4A7CD6',DEN:'#FB4F14',DET:'#0076B6',GB:'#57A05C',HOU:'#C42B45',IND:'#3F76D2',JAX:'#12A5BC',KC:'#E31837',LV:'#B8C4CA',LAC:'#0080C6',LAR:'#3F6FE0',MIA:'#00A5A0',MIN:'#8A63D2',NE:'#C8102E',NO:'#D3BC8D',NYG:'#4A6FD6',NYJ:'#1FA37A',PHI:'#1FA394',PIT:'#FFB612',SF:'#C42B2B',SEA:'#69BE28',TB:'#D50A0A',TEN:'#4B92DB',WSH:'#B04545'};
const tc = a => TC[a] || '#4C8DFF';
const abSpan = a => `<b style="color:${tc(a)}">${a}</b>`;
const logo = a => `https://a.espncdn.com/i/teamlogos/nfl/500/${(a||'').toLowerCase()}.png`;
const badge = a => `<span class="t-abbr" data-ab="${a}" style="color:${tc(a)};background:${tc(a)}1E;border:1px solid ${tc(a)}55"><img src="${logo(a)}" alt="" loading="lazy" onerror="this.remove()"></span>`;
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const rel = iso => {
  const m = Math.round((Date.now() - new Date(iso)) / 60000);
  if (isNaN(m)) return '';
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.round(m/60);
  return h < 24 ? h + 'h ago' : Math.round(h/24) + 'd ago';
};
const kickoff = iso => new Date(iso).toLocaleString('en-US',{weekday:'short',hour:'numeric',minute:'2-digit'});
const odds = v => v == null ? '–' : (v > 0 ? '+' + Math.round(v) : String(Math.round(v)));
const spr = v => v == null ? '–' : (v > 0 ? '+' + v : String(v));
const pct = v => (v*100).toFixed(0) + '%';

let DATA = null;

function stateBadge(g){
  if (g.game_state === 'Live') return `<span class="state live">LIVE</span>`;
  if (g.game_state === 'Final') return `<span class="state final">FINAL</span>`;
  return `<span class="state preview">${esc(kickoff(g.game_time))}</span>`;
}

function gameCard(g){
  const L = g._lines || {};
  const aFav = (g.away_win_pct ?? 0) >= (g.home_win_pct ?? 0);
  const rows = ['away','home'].map(s => `<div class="team">
      <span class="t-name">${badge(ab(g[s+'_team']))}<span class="t-city">${esc(g[s+'_team'])}</span></span>
      <span class="t-num ${((s==='away')===aFav)?'fav':''}">${g[s+'_pts']?.toFixed(1) ?? '–'} · ${pct(g[s+'_win_pct'] ?? 0)}</span>
    </div>`).join('');
  const homeCover = (g.p_cover ?? .5) >= .5;
  const leanTeam = homeCover ? ab(g.home_team) : ab(g.away_team);
  const leanNum = L.spread != null ? spr(homeCover ? L.spread : -L.spread) : '';
  const coverP = homeCover ? (g.p_cover ?? .5) : 1 - (g.p_cover ?? .5);
  const overSide = (g.p_over ?? .5) >= .5;
  const totP = overSide ? (g.p_over ?? .5) : 1 - (g.p_over ?? .5);
  const cA = tc(ab(g.away_team)), cH = tc(ab(g.home_team));
  const favLogo = (aFav ? ab(g.away_team) : ab(g.home_team));
  const tierHtml = g.tier ? `<span class="tier ${g.tier}"><img src="${logo(favLogo)}" alt="" loading="lazy" onerror="this.remove()">${g.tier}</span>` : '';
  return `<div class="game">
    <div class="g-accent" style="background:linear-gradient(90deg,${cA},${cH})"></div>
    <div class="g-top">
      <span>${abSpan(ab(g.away_team))} @ ${abSpan(ab(g.home_team))}</span>
      <span class="g-badges">${stateBadge(g)}${tierHtml}</span>
    </div>
    ${rows}
    <div class="prob-track"><div class="prob-away" style="width:${(g.away_win_pct ?? .5)*100}%;background:${cA}"></div><div class="prob-home" style="background:${cH}"></div></div>
    <div class="g-stats">
      <div class="stat sb"><div class="v ${coverP>=.55?'hot':''}">${leanTeam} ${leanNum}</div><div class="l">COVER ${pct(coverP)}</div></div>
      <div class="stat sy"><div class="v ${totP>=.55?'hot':''}">${overSide ? 'Ov' : 'Un'} ${L.total ?? '–'}</div><div class="l">TOTAL ${pct(totP)}</div></div>
      <div class="stat st"><div class="v">${g.away_pts?.toFixed(0) ?? '–'}–${g.home_pts?.toFixed(0) ?? '–'}</div><div class="l">PROJ</div></div>
    </div>
    ${g.away_qb ? `<div class="qbs"><b>${esc(g.away_qb)}</b> ${g.away_qb_proj ? `(${g.away_qb_proj.pass_yds?.toFixed(0)} yds, ${g.away_qb_proj.pass_td?.toFixed(1)} TD)` : ''} vs <b>${esc(g.home_qb)}</b> ${g.home_qb_proj ? `(${g.home_qb_proj.pass_yds?.toFixed(0)} yds, ${g.home_qb_proj.pass_td?.toFixed(1)} TD)` : ''}</div>` : ''}
  </div>`;
}

function renderGames(d){
  const order = {Live:0, Preview:1, Final:2};
  const gs = [...d.games].sort((a,b) =>
    (order[a.game_state] ?? 1) - (order[b.game_state] ?? 1) ||
    new Date(a.game_time) - new Date(b.game_time));
  $('games').innerHTML = gs.map(gameCard).join('') || '<div class="empty">No games this week.</div>';
}

// QB projections across the slate, ranked by projected passing yards.
// Skill-position players appear automatically once the model fills
// away_skill / home_skill with projection fields.
// QB tags from projection profile
function qbTags(q){
  const t = [];
  if ((q.pass_yds ?? 0) >= 250) t.push(['VOLUME','#4C8DFF']);
  if ((q.pass_td ?? 0) >= 1.8) t.push(['TD UPSIDE','#FFD34D']);
  if ((q.rating ?? 0) >= 92) t.push(['EFFICIENT','#2DD4BF']);
  if ((q.int ?? 9) <= 0.7) t.push(['PROTECTS IT','#A78BFA']);
  return t.slice(0,3).map(([n,c]) =>
    `<span class="tag" style="color:${c};background:${c}1C;border:1px solid ${c}44">${n}</span>`).join('');
}
// Monte Carlo: pass yards ~ Normal(μ, .21μ), TDs ~ Poisson
const gauss = (m, s) => { let u=0,v=0; while(!u)u=Math.random(); while(!v)v=Math.random();
  return m + s * Math.sqrt(-2*Math.log(u)) * Math.cos(2*Math.PI*v); };
const pois = l => { const L=Math.exp(-l); let k=0,p=1; do{k++;p*=Math.random()}while(p>L); return k-1; };
let openSim = null;
const SIMCACHE = {};
function qbSim(q){
  const key = q.name + q.pass_yds;
  if (SIMCACHE[key]) return SIMCACHE[key];
  const N = 10000; let y = [0,0,0,0], t = [0,0,0,0];
  for (let i = 0; i < N; i++){
    const yd = gauss(q.pass_yds, q.pass_yds * .21);
    y[yd < 200 ? 0 : yd < 250 ? 1 : yd < 300 ? 2 : 3]++;
    const td = pois(q.pass_td ?? 1.4);
    t[td <= 1 ? 0 : td === 2 ? 1 : td === 3 ? 2 : 3]++;
  }
  return SIMCACHE[key] = {
    yds: [['<200',y[0]/N],['200-249',y[1]/N],['250-299',y[2]/N],['300+',y[3]/N]],
    tds: [['0-1 TD',t[0]/N],['2 TD',t[1]/N],['3 TD',t[2]/N],['4+ TD',t[3]/N]]
  };
}
function simPanel(q){
  const s = qbSim(q);
  const row = ([lab,p]) => `<div class="sim-row"><span class="sim-lab">${lab}</span>
    <div class="sim-bar"><div class="sim-fill" style="width:${(p*100).toFixed(1)}%"></div></div>
    <span class="sim-pct">${(p*100).toFixed(1)}%</span></div>`;
  return `<div class="sim"><div class="sim-head"><span>MONTE CARLO · PASS YDS</span><b>10,000 SIMS</b></div>${s.yds.map(row).join('')}
    <div class="sim-head" style="margin-top:10px"><span>PASS TDs</span></div>${s.tds.map(row).join('')}</div>`;
}

function renderPlays(d){
  const qbs = [];
  for (const g of d.games) {
    if (g.game_state === 'Final') continue;
    const matchup = `${ab(g.away_team)}@${ab(g.home_team)}`;
    for (const [side, opp] of [['away', ab(g.home_team)], ['home', ab(g.away_team)]]) {
      const q = g[side + '_qb_proj'];
      if (q && typeof q.pass_yds === 'number')
        qbs.push({...q, team: ab(g[side + '_team']), opp, matchup});
    }
  }
  qbs.sort((a,b) => b.pass_yds - a.pass_yds);
  $('plays').innerHTML = qbs.map((q,i) => {
    const key = q.name + '|' + q.matchup, open = openSim === key;
    return `<div class="play" data-key="${esc(key)}">
      <span class="rank ${i<3?'r'+(i+1):''}">${i+1}</span>
      <div class="p-main">
        <div class="p-player">${esc(q.name)}</div>
        <div class="p-meta">${abSpan(q.team)} vs ${abSpan(q.opp)}</div>
        <div>${qbTags(q)}</div>
      </div>
      <div class="p-edge">
        <div class="edge-val">${q.pass_yds.toFixed(0)} yds</div>
        <div class="p-odds">${(q.pass_td??0).toFixed(1)} TD · ${(q.int??0).toFixed(1)} INT · ${(q.rating??0).toFixed(0)} rate</div>
        <div class="sim-hint">${open ? '▾ SIM' : '▸ TAP TO SIM'}</div>
      </div>
      ${open ? simPanel(q) : ''}
    </div>`;
  }).join('') || '<div class="empty">No projections for this slate yet.</div>';
  document.querySelectorAll('.play[data-key]').forEach(el => el.onclick = () => {
    openSim = (openSim === el.dataset.key) ? null : el.dataset.key;
    renderPlays(DATA);
  });
}

async function load(){
  try {
    const r = await fetch(`../data/nfl_slate.json?t=${Date.now()}`);
    DATA = await r.json();
    $('updated').textContent = 'Updated ' + rel(DATA.generated_at);
    const strong = DATA.games.filter(g=>g.tier==='STRONG').length;
    $('slate').className = 'summary';
    $('slate').innerHTML =
      `<span class="sum-chip"><span class="dot" style="background:var(--blue)"></span>${DATA.games.length} games</span>` +
      (strong ? `<span class="sum-chip"><span class="dot" style="background:var(--yellow)"></span>${strong} strong</span>` : '') +
      `<span class="sum-chip"><span class="dot" style="background:#2DD4BF"></span>${DATA.date}</span>`;
    renderGames(DATA);
    renderPlays(DATA);
  } catch(e){ $('updated').textContent = 'Offline'; }
}
load();
setInterval(load, 10*60*1000);
document.addEventListener('visibilitychange', () => { if (!document.hidden) load(); });

document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
  t.classList.add('on');
  $('games').classList.toggle('hide', t.dataset.tab !== 'games');
  $('plays').classList.toggle('hide', t.dataset.tab !== 'plays');
});
if ('serviceWorker' in navigator) navigator.serviceWorker.register('../sw.js');
</script>
</body>
</html>
